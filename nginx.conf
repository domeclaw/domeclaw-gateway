worker_processes 1;
env ALICLOUD_API_KEY;

events { worker_connections 1024; }

http {
    resolver 127.0.0.11 8.8.8.8 valid=30s;

    lua_package_path "/usr/local/openresty/lualib/?.lua;;";
    lua_shared_dict response_body 1m;

    map $upstream_status $capture_response_body {
        ~[23][0-9][0-9] 1;
        default 0;
    }

    upstream alicloud_backend {
        server coding-intl.dashscope.aliyuncs.com:443;
        keepalive 32;
    }

    server {
        listen 80;

        # --- API Endpoint สำหรับสร้าง API Key ใหม่ (localhost only) ---
        location /admin/create_key {
            allow 127.0.0.1;
            allow 172.20.0.0/24;
            deny all;

            content_by_lua_block {
                local redis = require "resty.redis"
                local red = redis:new()
                red:set_timeout(1000)
                local ok, err = red:connect("172.20.0.10", 6379)

                if not ok then
                    ngx.status = 500
                    ngx.say('{"error": "Redis connection failed: ' .. tostring(err) .. '"}')
                    return
                end

                -- สร้าง API Key แบบสุ่ม
                local random = require "resty.random"
                local bytes = random.bytes(24)
                local new_key = "sk-" .. ngx.encode_base64(bytes):gsub("[/=+]", ""):sub(1, 32)

                -- สร้าง key หลัก (ไม่มี TTL - อยู่ตลอดไป)
                red:set("key:Bearer " .. new_key, "active")

                -- สร้าง usage 5 ชั่วโมง (TTL 18000 วินาที)
                red:set("usage:5h:Bearer " .. new_key, 0)
                red:expire("usage:5h:Bearer " .. new_key, 18000)

                -- สร้าง usage 7 วัน (TTL 604800 วินาที)
                red:set("usage:7d:Bearer " .. new_key, 0)
                red:expire("usage:7d:Bearer " .. new_key, 604800)

                ngx.status = 200
                ngx.say('{"api_key": "' .. new_key .. '"}')
            }
        }

        # --- API Endpoint สำหรับดู usage (localhost only) ---
        location /admin/get_usage {
            allow 127.0.0.1;
            allow 172.20.0.0/24;
            deny all;

            content_by_lua_block {
                local redis = require "resty.redis"
                local red = redis:new()
                red:set_timeout(1000)
                local ok, err = red:connect("172.20.0.10", 6379)

                if not ok then
                    ngx.status = 500
                    ngx.say('{"error": "Redis connection failed"}')
                    return
                end

                local args = ngx.req.get_uri_args()
                local api_key = args.key

                if not api_key then
                    ngx.status = 400
                    ngx.say('{"error": "Missing key parameter"}')
                    return
                end

                -- ตรวจสอบว่า key มีอยู่จริง
                local key_exists = red:get("key:Bearer " .. api_key)
                if key_exists == ngx.null then
                    ngx.status = 404
                    ngx.say('{"error": "Key not found"}')
                    return
                end

                -- ดึง usage 5 ชั่วโมง
                local usage_5h = red:get("usage:5h:Bearer " .. api_key)
                if usage_5h == ngx.null then usage_5h = 0 end

                -- ดึง usage 7 วัน
                local usage_7d = red:get("usage:7d:Bearer " .. api_key)
                if usage_7d == ngx.null then usage_7d = 0 end

                -- ดึง TTL ที่เหลือ
                local ttl_5h = red:ttl("usage:5h:Bearer " .. api_key)
                local ttl_7d = red:ttl("usage:7d:Bearer " .. api_key)

                ngx.status = 200
                ngx.say('{"key": "' .. api_key .. '", "usage_5h": ' .. tonumber(usage_5h) .. ', "limit_5h": 1000, "ttl_5h": ' .. ttl_5h .. ', "usage_7d": ' .. tonumber(usage_7d) .. ', "limit_7d": 8000, "ttl_7d": ' .. ttl_7d .. '}')
            }
        }

        # --- API Endpoint สำหรับ list ทุก key (localhost only) ---
        location /admin/list_keys {
            allow 127.0.0.1;
            allow 172.20.0.0/24;
            deny all;

            content_by_lua_block {
                local redis = require "resty.redis"
                local red = redis:new()
                red:set_timeout(1000)
                local ok, err = red:connect("172.20.0.10", 6379)

                if not ok then
                    ngx.status = 500
                    ngx.say('{"error": "Redis connection failed"}')
                    return
                end

                -- ดึงทุก key ที่ขึ้นต้นด้วย key:Bearer
                local keys = red:keys("key:Bearer *")
                local api_keys = {}

                for i, key in ipairs(keys) do
                    -- ตัด prefix "key:Bearer " ออก
                    local api_key = key:gsub("^key:Bearer ", "")
                    table.insert(api_keys, '"' .. api_key .. '"')
                end

                ngx.status = 200
                ngx.say('{"count": ' .. #api_keys .. ', "keys": [' .. table.concat(api_keys, ", ") .. ']}')
            }
        }

        location /v1 {
            access_by_lua_block {
                local redis = require "resty.redis"
                local red = redis:new()
                red:set_timeout(1000)
                local ok, err = red:connect("172.20.0.10", 6379)

                if not ok then
                    ngx.status = 500
                    ngx.say('{"error": "Redis connection failed"}')
                    return ngx.exit(500)
                end

                -- 1. ตรวจสอบ API Key
                local auth_header = ngx.var.http_authorization
                if not auth_header then
                    ngx.status = 401
                    ngx.say('{"error": "Missing API Key"}')
                    return ngx.exit(401)
                end

                -- 2. ตรวจสอบว่า key มีอยู่จริง
                local key_exists = red:get("key:" .. auth_header)
                if key_exists == ngx.null then
                    ngx.status = 401
                    ngx.say('{"error": "Invalid API Key"}')
                    return ngx.exit(401)
                end

                -- 3. เช็ค Usage 5 ชั่วโมง (limit 1000)
                local limit_5h = 1000
                local current_usage_5h = red:get("usage:5h:" .. auth_header)
                
                -- ถ้า TTL หมด (ไม่มี key) ให้สร้างใหม่
                if current_usage_5h == ngx.null then
                    red:set("usage:5h:" .. auth_header, 0)
                    red:expire("usage:5h:" .. auth_header, 18000)
                    current_usage_5h = 0
                end

                if tonumber(current_usage_5h) >= limit_5h then
                    ngx.status = 429
                    ngx.say('{"error": "Quota exceeded for 5-hour window. Resets in ' .. red:ttl("usage:5h:" .. auth_header) .. ' seconds."}')
                    return ngx.exit(429)
                end

                -- 4. เช็ค Usage 7 วัน (limit 8000)
                local limit_7d = 8000
                local current_usage_7d = red:get("usage:7d:" .. auth_header)
                
                -- ถ้า TTL หมด (ไม่มี key) ให้สร้างใหม่
                if current_usage_7d == ngx.null then
                    red:set("usage:7d:" .. auth_header, 0)
                    red:expire("usage:7d:" .. auth_header, 604800)
                    current_usage_7d = 0
                end

                if tonumber(current_usage_7d) >= limit_7d then
                    ngx.status = 429
                    ngx.say('{"error": "Quota exceeded for 7-day window. Resets in ' .. red:ttl("usage:7d:" .. auth_header) .. ' seconds."}')
                    return ngx.exit(429)
                end

                -- บันทึกข้อมูลสำหรับใช้ใน log_by_lua_block
                ngx.ctx.auth_header = auth_header

                -- Set Authorization header สำหรับ upstream
                local alicloud_api_key = os.getenv("ALICLOUD_API_KEY")
                if alicloud_api_key then
                    ngx.req.set_header("Authorization", "Bearer " .. alicloud_api_key)
                end
            }

            proxy_ssl_server_name on;
            proxy_ssl_name coding-intl.dashscope.aliyuncs.com;
            proxy_set_header Host coding-intl.dashscope.aliyuncs.com;
            proxy_set_header Content-Type "application/json";

            body_filter_by_lua_block {
                if ngx.arg[1] ~= "" then
                    ngx.ctx.buffer = (ngx.ctx.buffer or "") .. ngx.arg[1]
                end

                if ngx.arg[2] then
                    local response_body = ngx.ctx.buffer or ""
                    ngx.shared.response_body:set("last_response", response_body)
                end
            }

            proxy_pass https://alicloud_backend/v1;

            log_by_lua_block {
                local response_body = ngx.shared.response_body:get("last_response")
                local auth_header = ngx.ctx.auth_header

                local function update_usage_in_background(premature, auth_header, response_body)
                    if premature then return end
                    if not (response_body and auth_header) then return end

                    local redis = require "resty.redis"
                    local cjson = require "cjson"

                    local red = redis:new()
                    red:set_timeout(1000)
                    local ok, err = red:connect("172.20.0.10", 6379)
                    if not ok then
                        ngx.log(ngx.ERR, "Failed to connect to Redis: ", err)
                        return
                    end

                    local success, response = pcall(cjson.decode, response_body)
                    if success and response and response.usage and response.usage.total_tokens then
                        local total_tokens = response.usage.total_tokens

                        -- อัปเดต usage 5 ชั่วโมง
                        local usage_5h = red:get("usage:5h:" .. auth_header)
                        if usage_5h == ngx.null then
                            red:set("usage:5h:" .. auth_header, total_tokens)
                            red:expire("usage:5h:" .. auth_header, 18000)
                        else
                            red:incrby("usage:5h:" .. auth_header, total_tokens)
                        end

                        -- อัปเดต usage 7 วัน
                        local usage_7d = red:get("usage:7d:" .. auth_header)
                        if usage_7d == ngx.null then
                            red:set("usage:7d:" .. auth_header, total_tokens)
                            red:expire("usage:7d:" .. auth_header, 604800)
                        else
                            red:incrby("usage:7d:" .. auth_header, total_tokens)
                        end

                        ngx.log(ngx.INFO, "Updated usage for ", auth_header, ": 5h=", red:get("usage:5h:" .. auth_header), ", 7d=", red:get("usage:7d:" .. auth_header))
                    end

                    ngx.shared.response_body:delete("last_response")
                    red:close()
                end

                local ok, err = ngx.timer.at(0, update_usage_in_background, auth_header, response_body)
                if not ok then
                    ngx.log(ngx.ERR, "Failed to create timer: ", err)
                end
            }
        }
    }
}
