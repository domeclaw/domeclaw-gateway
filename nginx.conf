worker_processes 1;
env ALICLOUD_API_KEY; # Allow environment variable to be accessible in nginx config

events { worker_connections 1024; }

http {
    resolver 127.0.0.11 8.8.8.8 valid=30s; # Docker DNS + Google DNS

    lua_package_path "/usr/local/openresty/lualib/?.lua;;";
    lua_shared_dict response_body 1m; # Shared dictionary to store response body

    # Map to capture response body
    map $upstream_status $capture_response_body {
        ~[23][0-9][0-9] 1;  # Capture for successful responses
        default 0;
    }

    upstream alicloud_backend {
        server coding-intl.dashscope.aliyuncs.com:443;
        keepalive 32;
    }

    server {
        listen 80;

        # --- API Endpoint สำหรับสร้าง API Key ใหม่ (เข้าถึงได้เฉพาะ localhost) ---
        location /admin/create_key {
            allow 127.0.0.1;
            allow 172.20.0.0/24;
            deny all;

            content_by_lua_block {
                local redis = require "resty.redis"
                local red = redis:new()
                red:set_timeout(1000)
                local ok, err = red:connect("172.20.0.10", 6379)

                if not ok then
                    ngx.status = 500
                    ngx.say('{"error": "Redis connection failed: ' .. tostring(err) .. '"}')
                    return
                end

                -- สร้าง API Key แบบสุ่ม
                local random = require "resty.random"
                local bytes = random.bytes(24)
                local new_key = "sk-" .. ngx.encode_base64(bytes):gsub("[/=+]", ""):sub(1, 32)

                -- ตั้งค่าเริ่มต้นใน Redis
                red:set("usage:Bearer " .. new_key, 0)
                red:expire("usage:Bearer " .. new_key, 18000) -- 5 ชั่วโมง

                ngx.status = 200
                ngx.say('{"api_key": "' .. new_key .. '"}')
            }
        }

        # --- API Endpoint สำหรับดู usage ของแต่ละ key (เข้าถึงได้เฉพาะ localhost) ---
        location /admin/get_usage {
            allow 127.0.0.1;
            allow 172.20.0.0/24;
            deny all;

            content_by_lua_block {
                local redis = require "resty.redis"
                local red = redis:new()
                red:set_timeout(1000)
                local ok, err = red:connect("172.20.0.10", 6379)

                if not ok then
                    ngx.status = 500
                    ngx.say('{"error": "Redis connection failed"}')
                    return
                end

                -- รับ API Key จาก query parameter
                local args = ngx.req.get_uri_args()
                local api_key = args.key

                if not api_key then
                    ngx.status = 400
                    ngx.say('{"error": "Missing key parameter"}')
                    return
                end

                -- ดึง usage จาก Redis
                local usage_key = "usage:Bearer " .. api_key
                local current_usage = red:get(usage_key)

                if current_usage == ngx.null then
                    ngx.status = 404
                    ngx.say('{"error": "Key not found"}')
                    return
                end

                ngx.status = 200
                ngx.say('{"key": "' .. api_key .. '", "usage": ' .. tonumber(current_usage) .. '}')
            }
        }

        location /v1 {
            access_by_lua_block {
                local redis = require "resty.redis"
                local red = redis:new()
                red:set_timeout(1000)
                local ok, err = red:connect("172.20.0.10", 6379)

                if not ok then
                    ngx.status = 500
                    ngx.say('{"error": "Redis connection failed"}')
                    return ngx.exit(500)
                end

                -- 1. ตรวจสอบ API Key ที่ส่งมา (Bearer Token)
                local auth_header = ngx.var.http_authorization
                if not auth_header then
                    ngx.status = 401
                    ngx.say('{"error": "Missing API Key"}')
                    return ngx.exit(401)
                end

                -- 2. เช็ค Usage ใน Redis
                local limit = 1000 -- ตั้ง Limit ไว้ที่ 1,000 tokens
                local current_usage = red:get("usage:" .. auth_header)

                if current_usage ~= ngx.null and tonumber(current_usage) >= limit then
                    ngx.status = 429
                    ngx.say('{"error": "Quota exceeded. Resets every 5 hours."}')
                    return ngx.exit(429)
                end

                -- ถ้าไม่มีข้อมูล แสดงว่า key นี้ไม่ถูกต้อง (ไม่ได้สร้างจาก /admin/create_key)
                if current_usage == ngx.null then
                    ngx.status = 401
                    ngx.say('{"error": "Invalid API Key"}')
                    return ngx.exit(401)
                end

                -- บันทึก API Key ลงใน context เพื่อใช้ใน log_by_lua_block
                ngx.ctx.auth_header = auth_header

                -- Set Authorization header from environment variable for upstream
                local alicloud_api_key = os.getenv("ALICLOUD_API_KEY")
                if alicloud_api_key then
                    ngx.req.set_header("Authorization", "Bearer " .. alicloud_api_key)
                end
            }

            # --- ส่ง Request ไปยัง Alibaba Cloud ---
            proxy_ssl_server_name on;
            proxy_ssl_name coding-intl.dashscope.aliyuncs.com;
            proxy_set_header Host coding-intl.dashscope.aliyuncs.com;
            proxy_set_header Content-Type "application/json";

            # Capture response body for processing
            body_filter_by_lua_block {
                if ngx.arg[1] ~= "" then
                    ngx.ctx.buffer = (ngx.ctx.buffer or "") .. ngx.arg[1]
                end

                if ngx.arg[2] then  -- last chunk
                    local response_body = ngx.ctx.buffer or ""
                    ngx.shared.response_body:set("last_response", response_body)
                end
            }

            proxy_pass https://alicloud_backend/v1;

            # --- อัปเดต Token Usage จาก Response ---
            log_by_lua_block {
                -- Use a post-subrequest callback to update usage after response
                local response_body = ngx.shared.response_body:get("last_response")
                local auth_header = ngx.ctx.auth_header

                -- Schedule Redis update for next tick to avoid context restrictions
                local function update_usage_in_background(premature, auth_header, response_body)
                    if premature then
                        return
                    end

                    if not (response_body and auth_header) then
                        return
                    end

                    local redis = require "resty.redis"
                    local cjson = require "cjson"

                    local red = redis:new()
                    red:set_timeout(1000)
                    local ok, err = red:connect("172.20.0.10", 6379)

                    if not ok then
                        ngx.log(ngx.ERR, "Failed to connect to Redis in timer: ", err)
                        return
                    end

                    local success, response = pcall(cjson.decode, response_body)

                    if success and response and response.usage and response.usage.total_tokens then
                        local total_tokens = response.usage.total_tokens

                        -- อัปเดต usage ใน Redis
                        local current_usage = red:get("usage:" .. auth_header)
                        if current_usage == ngx.null then
                            current_usage = 0
                        else
                            current_usage = tonumber(current_usage)
                        end

                        local new_usage = current_usage + total_tokens
                        red:set("usage:" .. auth_header, new_usage)

                        ngx.log(ngx.INFO, "Updated usage for ", auth_header, ": ", new_usage, " tokens")
                    else
                        ngx.log(ngx.WARN, "Could not extract token usage from response: ", response_body)
                    end

                    -- Clean up shared dictionary
                    ngx.shared.response_body:delete("last_response")

                    -- Close Redis connection
                    red:close()
                end

                -- Schedule the function to run in the next tick
                local ok, err = ngx.timer.at(0, update_usage_in_background, auth_header, response_body)
                if not ok then
                    ngx.log(ngx.ERR, "Failed to create timer for usage update: ", err)
                end
            }
        }
    }
}